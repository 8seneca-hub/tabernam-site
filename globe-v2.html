<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Globe v2</title>
<style>
  html, body { margin: 0; height: 100%; background: #ffffff; color: #2c3640;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    overflow: hidden;
  }
  #globe { position: fixed; inset: 0; z-index: 2; }

  /* CSS aura — replaces the additive shader atmosphere (which is invisible on white) */
  #aura {
    position: fixed; inset: 0; pointer-events: none; z-index: 1;
    background: radial-gradient(
      circle at 50% 50%,
      rgba(120, 170, 220, 0.45) 0%,
      rgba(140, 185, 230, 0.30) 22%,
      rgba(170, 205, 240, 0.18) 35%,
      rgba(210, 228, 245, 0.08) 48%,
      rgba(255, 255, 255, 0)    62%
    );
  }

  /* film-grain / scan overlay — keep but very subtle on the bright theme */
  #grain {
    position: fixed; inset: 0; pointer-events: none; z-index: 5;
    background-image: url('noise-anim.gif'), url('overlay.jpg');
    background-size: 240px 240px, cover;
    background-repeat: repeat, no-repeat;
    mix-blend-mode: multiply;
    opacity: 0.10;
  }

  #legend {
    position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 36px;
    font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase;
    color: #2c3640; z-index: 20;
  }
  #legend .item { display: flex; align-items: center; gap: 10px; }
  #legend .dot { width: 9px; height: 9px; transform: rotate(45deg); background: #19fa8f; }

  #status {
    position: fixed; top: 14px; left: 16px; color: #5b6772;
    font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; z-index: 20;
  }
</style>
</head>
<body>
<div id="aura"></div>
<div id="globe"></div>
<div id="grain"></div>

<div id="status">Loading…</div>
<div id="legend">
  <div class="item"><span class="dot"></span>Slovakia → China</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/globe.gl@2"></script>
<script>
  const statusEl = document.getElementById('status');

  // ─── Single origin ────────────────────────────────────────────────────────
  const SLOVAKIA = { lat: 48.1486, lng: 17.1077 }; // Bratislava

  // ─── ~20 destinations across China ────────────────────────────────────────
  const CHINA_DESTINATIONS = [
    { name: 'Beijing',    lat: 39.9042, lng: 116.4074 },
    { name: 'Shanghai',   lat: 31.2304, lng: 121.4737 },
    { name: 'Guangzhou',  lat: 23.1291, lng: 113.2644 },
    { name: 'Shenzhen',   lat: 22.5429, lng: 114.0596 },
    { name: 'Chengdu',    lat: 30.5728, lng: 104.0668 },
    { name: 'Chongqing',  lat: 29.5630, lng: 106.5516 },
    { name: "Xi'an",      lat: 34.3416, lng: 108.9398 },
    { name: 'Wuhan',      lat: 30.5928, lng: 114.3055 },
    { name: 'Hangzhou',   lat: 30.2741, lng: 120.1551 },
    { name: 'Tianjin',    lat: 39.3434, lng: 117.3616 },
    { name: 'Nanjing',    lat: 32.0603, lng: 118.7969 },
    { name: 'Harbin',     lat: 45.8038, lng: 126.5340 },
    { name: 'Shenyang',   lat: 41.8057, lng: 123.4315 },
    { name: 'Kunming',    lat: 25.0389, lng: 102.7183 },
    { name: 'Lhasa',      lat: 29.6520, lng:  91.1721 },
    { name: 'Urumqi',     lat: 43.8256, lng:  87.6168 },
    { name: 'Lanzhou',    lat: 36.0611, lng: 103.8343 },
    { name: 'Qingdao',    lat: 36.0671, lng: 120.3826 },
    { name: 'Hong Kong',  lat: 22.3193, lng: 114.1694 },
    { name: 'Xiamen',     lat: 24.4798, lng: 118.0894 }
  ];

  // ─── Arc styling (green "supplying tech" palette from source bundle) ──────
  const PALETTE = [
    'rgba(25,250,143,0.5)',  'rgba(25,250,143,0.25)', 'rgba(3,109,60,0.125)',
    'rgba(3,109,60,0.125)',  'rgba(25,250,143,0.25)', 'rgba(25,250,143,0.5)'
  ];
  const DASH_LEN = 1, DASH_GAP = 15;

  const arcs = CHINA_DESTINATIONS.map(d => ({
    startLat: SLOVAKIA.lat, startLng: SLOVAKIA.lng,
    endLat:   d.lat,        endLng:   d.lng,
    color: PALETTE,
    stroke: 0.5,
    dashLength: DASH_LEN, dashGap: DASH_GAP,
    dashInitialGap: Math.random() * (DASH_LEN + DASH_GAP),
    dashAnimateTime: 2000
  }));

  (async () => {
    statusEl.textContent = `1 origin (Slovakia) · ${arcs.length} destinations`;

    const globe = Globe()(document.getElementById('globe'))
      .backgroundColor('rgba(0,0,0,0)')
      .atmosphereColor('#a8c8e8')
      .atmosphereAltitude(0.18)
      .globeImageUrl('earth-blue-marble.jpg')
      .bumpImageUrl('globe-topology.png')

      // Arcs: 20 lines, all from Slovakia, fanning out across China
      .arcsData(arcs)
      .arcColor('color')
      .arcStroke('stroke')
      .arcAltitudeAutoScale(0.5)
      .arcDashLength('dashLength')
      .arcDashGap('dashGap')
      .arcDashInitialGap('dashInitialGap')
      .arcDashAnimateTime('dashAnimateTime')
      .arcsTransitionDuration(0)

      // Pulsing ripple at the Slovakia origin
      .ringsData([{ lat: SLOVAKIA.lat, lng: SLOVAKIA.lng }])
      .ringColor(() => t => `rgba(255,255,255,${0.9 * (1 - t)})`)
      .ringMaxRadius(2.5)
      .ringPropagationSpeed(0.9)
      .ringRepeatPeriod(700)
      .ringAltitude(0.005)

      // Solid green dot at the origin
      .pointsData([{ lat: SLOVAKIA.lat, lng: SLOVAKIA.lng }])
      .pointColor(() => 'rgb(25,250,143)')
      .pointAltitude(0.012)
      .pointRadius(0.3);

    globe.globeMaterial().bumpScale = 5;

    // Start centered on Slovakia; auto-rotate will bring China into view
    globe.pointOfView({ lat: SLOVAKIA.lat, lng: SLOVAKIA.lng, altitude: 2.2 }, 0);

    const ctrl = globe.controls();
    ctrl.autoRotate = true;
    ctrl.autoRotateSpeed = 0.3;
    ctrl.enableZoom = true;

    window.addEventListener('resize', () => {
      globe.width(window.innerWidth).height(window.innerHeight);
    });
  })().catch(err => {
    statusEl.textContent = 'Error: ' + err.message;
    console.error(err);
  });
</script>
</body>
</html>
