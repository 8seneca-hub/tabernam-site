<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Globe v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; background: #000; color: #cfd6dd;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    overflow-x: hidden;
    scrollbar-width: none;       /* Firefox */
    -ms-overflow-style: none;    /* Edge/IE */
  }
  html::-webkit-scrollbar,
  body::-webkit-scrollbar { display: none; }   /* Chrome/Safari */
  body { min-height: 130vh; position: relative; }
  body.no-scroll { overflow: hidden; height: 100vh; min-height: 100vh; }
  #stars { position: fixed; inset: 0; z-index: 0; display: block; }
  #globe {
    position: absolute; top: 0; left: 0;
    width: 100vw; height: 100vh;
    z-index: 2;
    transform: translateY(30%) scale(1);
    transform-origin: center center;
    transition: transform 1.1s cubic-bezier(0.65, 0.05, 0.36, 1);
  }
  #globe.shifted {
    position: fixed;
    transform: translate(-25%, 0) scale(1.2);
  }

  #intro {
    position: absolute; top: 8vh; left: 50%;
    width: 90%; max-width: 720px;
    text-align: center;
    font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
    color: #ffffff; z-index: 10;
    pointer-events: none;
    transform: translate(-50%, 0);
    opacity: 1;
    transition: transform 1.1s cubic-bezier(0.65, 0.05, 0.36, 1),
                opacity 0.7s ease;
  }
  #intro.out {
    transform: translate(-50%, -140%);
    opacity: 0;
  }
  #intro h1 {
    margin: 0 0 16px;
    font-size: clamp(24px, 2.6vw, 34px);
    font-weight: 700;
    letter-spacing: -0.01em;
    line-height: 1.15;
  }
  #intro p {
    margin: 0 auto;
    max-width: 620px;
    font-size: clamp(13px, 1.05vw, 15px);
    line-height: 1.6;
    font-weight: 400;
    color: #b8c2cc;
  }
  #intro .cta {
    pointer-events: auto;
    display: inline-block;
    margin-top: 24px;
    padding: 12px 26px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.04em;
    color: #ffffff;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.35);
    border-radius: 999px;
    text-decoration: none;
    cursor: pointer;
    transition: background 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
  }
  #intro .cta:hover {
    background: rgba(255, 255, 255, 0.12);
    border-color: rgba(255, 255, 255, 0.7);
    transform: translateY(-1px);
  }

  /* ─── Detail panel (full-height white card on the right, single-card view) ── */
  #cities {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: 40vw;
    max-width: 100vw;
    z-index: 11;
    padding: 0;
    display: flex; flex-direction: column;
    font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
    color: #000000;
    background: #ffffff;
    transform: translateX(110%);
    opacity: 0;
    pointer-events: none;
    transition: transform 1.1s cubic-bezier(0.65, 0.05, 0.36, 1),
                opacity 0.7s ease;
  }
  #cities.in {
    transform: translateX(0);
    opacity: 1;
    pointer-events: auto;
  }
  #cities-list {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  /* Only the .expanded card is rendered; switching cities cross-fades the panel. */
  .city-card {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    padding: 72px 40px 20px;
    box-sizing: border-box;
    background: #ffffff;
    color: #000000;
    overflow-y: auto;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.3s ease, visibility 0s linear 0.3s;
  }
  .city-card.expanded {
    opacity: 1;
    visibility: visible;
    transition: opacity 0.3s ease, visibility 0s;
  }
  .city-details { display: block; }
  .city-details-inner { min-height: 0; }
  .city-eyebrow {
    margin: 0 0 12px;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #888888;
  }
  .city-name {
    margin: 0 0 28px;
    color: #000000;
    font-weight: 700;
    font-size: 34px;
    line-height: 1.15;
    letter-spacing: -0.01em;
  }
  .city-thumb {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    border-radius: 4px;
    margin-bottom: 28px;
    flex-shrink: 0;
    overflow: hidden;
    background: #111111;
  }
  .city-thumb-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 0.6s ease;
  }
  .city-thumb-img.active { opacity: 1; }
  .city-desc {
    margin: 0 0 24px;
    padding: 0;
    color: #000000;
    font-size: 17px;
    line-height: 1.6;
    font-weight: 400;
  }
  .city-section-title {
    margin: 8px 0 14px;
    font-size: 18px;
    font-weight: 700;
    color: #000000;
    letter-spacing: -0.005em;
    line-height: 1.25;
  }
  .city-body {
    margin: 0 0 22px;
    color: #1a1a1a;
    font-size: 16px;
    line-height: 1.65;
    font-weight: 400;
  }
  .city-list {
    margin: 0 0 28px;
    padding-left: 20px;
    color: #1a1a1a;
    font-size: 16px;
    line-height: 1.7;
  }
  .city-list li { margin-bottom: 6px; }
  .city-button {
    margin: 0;
    display: inline-block;
    padding: 10px 20px;
    background: #0a1d3a;
    color: #ffffff;
    border: none;
    border-radius: 4px;
    font-family: inherit;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s ease;
  }
  .city-button:hover { background: #142d57; }

  /* ─── Close button (only visible in expanded state) ──────────────────── */
  #close-btn {
    position: fixed; top: 18px; right: 42px;
    width: 48px; height: 34px;
    box-sizing: border-box;
    padding: 0 10px;
    z-index: 12;
    display: flex; align-items: center; justify-content: center;
    background: transparent; border: none;
    color: #000000; cursor: pointer;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.45s ease 0.3s;
  }
  #close-btn.visible {
    opacity: 0.85;
    pointer-events: auto;
  }
  #close-btn:hover { opacity: 1; }
  #close-btn svg { width: 22px; height: 22px; }

  /* film-grain / scan overlay — very subtle on dark */
  #grain {
    position: fixed; inset: 0; pointer-events: none; z-index: 5;
    background-image: url('noise-anim.gif');
    background-size: 240px 240px;
    background-repeat: repeat;
    mix-blend-mode: screen;
    opacity: 0.04;
  }

  /* Diamond city markers (globe.gl htmlElementsData) */
  .globe-marker {
    display: flex;
    align-items: center;
    cursor: pointer;
    pointer-events: auto;
    color: #fff;
    transform: translate(-50%, -50%);
    padding: 6px;
  }
  .globe-marker-shape {
    width: 10px;
    height: 10px;
    border: 1.5px solid rgba(255, 255, 255, 0.7);
    background: transparent;
    transform: rotate(45deg);
    flex-shrink: 0;
    transition: width 0.2s ease, height 0.2s ease, background 0.2s ease, border-color 0.2s ease;
  }
  .globe-marker.is-active .globe-marker-shape {
    width: 14px;
    height: 14px;
    background: #fff;
    border-color: #fff;
  }
  .globe-marker-label {
    margin-left: 14px;
    padding: 4px 10px;
    background: rgba(255, 255, 255, 0.9);
    color: #1a1a1a;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.01em;
    border-radius: 4px;
    white-space: nowrap;
    display: none;
  }
  .globe-marker.is-active .globe-marker-label {
    display: block;
  }
</style>
</head>
<body>
<canvas id="stars"></canvas>
<div id="globe"></div>
<div id="grain"></div>

<div id="intro">
  <h1>A career mapped across continents.</h1>
  <p>Each pin marks years of work — negotiations, factories, partnerships and the people behind them. Explore the cities that have shaped four decades of foreign trade, with a focus on the relationships built across China.</p>
  <button type="button" class="cta">View cities</button>
</div>

<aside id="cities">
  <div id="cities-list"></div>
</aside>

<button id="close-btn" type="button" aria-label="Close">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
    <path d="M6 6l12 12M18 6L6 18" />
  </svg>
</button>

<script>
  // ─── Animated parallax starfield (multi-layer 2D canvas) ──────────────────
  (function drawStars() {
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');

    // Each layer drifts at its own rate. Far layer = many small dim stars,
    // near layer = fewer larger brighter stars — classic depth illusion.
    // Each layer drifts at its own rate. Far layer = many small dim stars,
    // near layer = fewer larger brighter stars — classic depth illusion.
    const LAYERS = [
      { density: 9600,  speed: 0.0010, sizeMin: 0.3, sizeMax: 0.7, alphaMin: 0.06, alphaMax: 0.18, brightChance: 0.00 },
      { density: 14400, speed: 0.0040, sizeMin: 0.5, sizeMax: 1.0, alphaMin: 0.14, alphaMax: 0.32, brightChance: 0.02 },
      { density: 28000, speed: 0.0080, sizeMin: 0.8, sizeMax: 1.6, alphaMin: 0.28, alphaMax: 0.55, brightChance: 0.12 }
    ];

    let tileW = 0, tileH = 0;
    let last = performance.now();

    function buildLayer(layer, dpr) {
      const count = Math.floor((tileW * tileH) / layer.density);
      const tile = document.createElement('canvas');
      tile.width = tileW;
      tile.height = tileH;
      const tctx = tile.getContext('2d');

      for (let i = 0; i < count; i++) {
        const bright = Math.random() < layer.brightChance;
        const x = Math.random() * tileW;
        const y = Math.random() * tileH;
        const r = (layer.sizeMin + Math.random() * (layer.sizeMax - layer.sizeMin)) * dpr * (bright ? 1.6 : 1);
        const a = (layer.alphaMin + Math.random() * (layer.alphaMax - layer.alphaMin)) * (bright ? 1 : 0.85);
        const tint = bright && Math.random() < 0.25 ? 'rgba(150,175,210,' : 'rgba(180,195,215,';

        // Draw star plus horizontal wrap copies for seamless tiling.
        for (const dx of [0, -tileW, tileW]) {
          tctx.beginPath();
          tctx.fillStyle = tint + a + ')';
          tctx.arc(x + dx, y, r, 0, Math.PI * 2);
          tctx.fill();
        }
      }

      return { tile, speed: layer.speed, offset: Math.random() * tileW };
    }

    let layers = [];

    function seed() {
      const dpr = window.devicePixelRatio || 1;
      const w = canvas.width  = window.innerWidth  * dpr;
      const h = canvas.height = window.innerHeight * dpr;
      canvas.style.width  = window.innerWidth + 'px';
      canvas.style.height = window.innerHeight + 'px';

      tileW = w * 2;
      tileH = h;
      layers = LAYERS.map(l => buildLayer(l, dpr));
    }

    function tick(now) {
      const dt = now - last;
      last = now;

      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (const L of layers) {
        const pxPerMs = (canvas.width * L.speed) / 1000;
        L.offset = (L.offset + dt * pxPerMs) % tileW;
        ctx.drawImage(L.tile, -L.offset, 0);
        ctx.drawImage(L.tile, -L.offset + tileW, 0);
      }

      requestAnimationFrame(tick);
    }

    seed();
    requestAnimationFrame(tick);
    window.addEventListener('resize', seed);
  })();
</script>

<script src="https://cdn.jsdelivr.net/npm/globe.gl@2"></script>
<script>
  // ─── Single origin ────────────────────────────────────────────────────────
  const SLOVAKIA = { lat: 48.1486, lng: 17.1077 }; // Bratislava

  // ─── ~20 destinations across China ────────────────────────────────────────
  const CHINA_DESTINATIONS = [
    { name: 'Beijing',    lat: 39.9042, lng: 116.4074 },
    { name: 'Shanghai',   lat: 31.2304, lng: 121.4737 },
    { name: 'Guangzhou',  lat: 23.1291, lng: 113.2644 },
    { name: 'Shenzhen',   lat: 22.5429, lng: 114.0596 },
    { name: 'Chengdu',    lat: 30.5728, lng: 104.0668 },
    { name: 'Chongqing',  lat: 29.5630, lng: 106.5516 },
    { name: "Xi'an",      lat: 34.3416, lng: 108.9398 },
    { name: 'Wuhan',      lat: 30.5928, lng: 114.3055 },
    { name: 'Hangzhou',   lat: 30.2741, lng: 120.1551 },
    { name: 'Tianjin',    lat: 39.3434, lng: 117.3616 },
    { name: 'Nanjing',    lat: 32.0603, lng: 118.7969 },
    { name: 'Harbin',     lat: 45.8038, lng: 126.5340 },
    { name: 'Shenyang',   lat: 41.8057, lng: 123.4315 },
    { name: 'Kunming',    lat: 25.0389, lng: 102.7183 },
    { name: 'Lhasa',      lat: 29.6520, lng:  91.1721 },
    { name: 'Urumqi',     lat: 43.8256, lng:  87.6168 },
    { name: 'Lanzhou',    lat: 36.0611, lng: 103.8343 },
    { name: 'Qingdao',    lat: 36.0671, lng: 120.3826 },
    { name: 'Hong Kong',  lat: 22.3193, lng: 114.1694 },
    { name: 'Xiamen',     lat: 24.4798, lng: 118.0894 }
  ];

  // ─── Arc styling (green "supplying tech" palette from source bundle) ──────
  const PALETTE = [
    'rgba(25,250,143,0.5)',  'rgba(25,250,143,0.25)', 'rgba(3,109,60,0.125)',
    'rgba(3,109,60,0.125)',  'rgba(25,250,143,0.25)', 'rgba(25,250,143,0.5)'
  ];
  const DASH_LEN = 1, DASH_GAP = 15;

  const arcs = CHINA_DESTINATIONS.map(d => ({
    startLat: SLOVAKIA.lat, startLng: SLOVAKIA.lng,
    endLat:   d.lat,        endLng:   d.lng,
    color: PALETTE,
    stroke: 0.5,
    dashLength: DASH_LEN, dashGap: DASH_GAP,
    dashInitialGap: Math.random() * (DASH_LEN + DASH_GAP),
    dashAnimateTime: 2000
  }));

  // ─── Business name per city (placeholders — replace with CMS data) ───────
  const BUSINESSES = {
    'Beijing':    'Tabernam Beijing Office',
    'Shanghai':   'Pudong Negotiation Hub',
    'Guangzhou':  'Pearl River Trade Center',
    'Shenzhen':   'Shenzhen Innovation Partners',
    'Chengdu':    'Western China Liaison',
    'Chongqing':  'Yangtze Industrial Bureau',
    "Xi'an":      'Silk Road Heritage Office',
    'Wuhan':      'Central Logistics Group',
    'Hangzhou':   'West Lake Enterprise Lab',
    'Tianjin':    'Bohai Port Office',
    'Nanjing':    'Yangtze Capital Office',
    'Harbin':     'Northern Frontier Office',
    'Shenyang':   'Northeast Heavy Industry Hub',
    'Kunming':    'Southwest Gateway Office',
    'Lhasa':      'High-Plateau Mission',
    'Urumqi':     'Westernmost Trade Office',
    'Lanzhou':    'Silk Road Pivot Office',
    'Qingdao':    'Coastal Manufacturing Office',
    'Hong Kong':  'Pearl Delta Mediation',
    'Xiamen':     'Strait Trade Office'
  };

  // ─── Per-city descriptions (short narratives from the practice) ───────────
  const DESCRIPTIONS = {
    'Beijing':   "Where every meaningful negotiation eventually leads. Beijing's rhythm is patient, hierarchical, and rewards relationships built over decades — not deals built overnight.",
    'Shanghai':  "The skyline that announced modern China to the world. Pudong has been the setting for some of the most consequential negotiations of my career — fast, formal, and unforgiving of unprepared visitors.",
    'Guangzhou': "Centuries of merchant trading heritage compressed into one city. Deals here move quickly, but only after the people across the table have decided you're worth their time.",
    'Shenzhen':  "Innovation acceleration engine of the south. Shenzhen demands sustained engagement — partners here remember who showed up early and who stayed.",
    'Chengdu':   "Patient relationship-building in western China. Business in Chengdu unfolds over tea, meals and long walks — never slide decks.",
    'Chongqing': "A mountain-and-river crossroads where industrial scale meets old-world bargaining instincts. Few visitors leave without changing their view of inland China.",
    "Xi'an":     "Silk Road heritage anchors every conversation here. Xi'an reminds you that trade between Europe and Asia is older than most national borders.",
    'Wuhan':     "Central China's manufacturing heart. Deals in Wuhan favour those who understand logistics as deeply as relationships.",
    'Hangzhou':  "Incubator of national-scale private enterprise. The lake city quietly produced China's most consequential consumer-tech founders.",
    'Tianjin':   "Beijing's port and rehearsal stage. Many strategic conversations begin in Tianjin before they ever reach the capital.",
    'Nanjing':   "Old capital, deep institutions. Nanjing teaches you the difference between ceremony and substance.",
    'Harbin':    "Far-northern gateway to Russia. Cross-border trade here keeps the European-Asian bridge concrete and current.",
    'Shenyang':  "Heavy industry heartland. Northeastern factories that powered three generations of growth are now reinventing themselves.",
    'Kunming':   "Gateway to Southeast Asia. Decisions reached in Kunming ripple south into Laos, Vietnam and Myanmar within weeks.",
    'Lhasa':     "The highest, slowest negotiations on earth. Lhasa rewards reverence and patience above any other quality.",
    'Urumqi':    "Westernmost frontier, where modern logistics still pass through centuries-old trade corridors.",
    'Lanzhou':   "The pivot point on the Silk Road. From Lanzhou, China's reach genuinely extends west.",
    'Qingdao':   "European industrial DNA, Asian execution. Qingdao's port and brewing history quietly shaped global manufacturing standards.",
    'Hong Kong': "The bridge that taught the rest of the country how to negotiate with the West — and still the room where the most discreet conversations happen.",
    'Xiamen':    "Quiet southern port with deep ties to Taiwan and Southeast Asia. Subtle, careful, and lucrative for those who learn its rhythms."
  };

  // ─── Carousel photo pool (lives in public/carousel/) ─────────────────────
  const ALL_PHOTOS = Array.from({ length: 28 }, (_, i) =>
    `carousel/photo-${String(i + 1).padStart(2, '0')}.jpg`
  );
  function pickRandomPhotos(n) {
    const shuffled = ALL_PHOTOS.slice().sort(() => Math.random() - 0.5);
    return shuffled.slice(0, n);
  }

  // Globe instance + active-city state are exposed at this scope so the
  // card UI handlers below can drive point highlighting / camera rotation.
  let globeInstance = null;
  let globeControls = null;
  let activeCityIdx = null;

  function buildPoints() {
    return CHINA_DESTINATIONS.map((d, i) => ({
      idx: i,
      lat: d.lat, lng: d.lng,
      name: BUSINESSES[d.name] || `Tabernam ${d.name}`,
      isActive: i === activeCityIdx
    }));
  }

  function activateCity(idx) {
    if (idx === activeCityIdx) return;
    setActiveCity(idx);
    document.querySelectorAll('.city-card.expanded').forEach(c => c.classList.remove('expanded'));
    const card = document.querySelector(`.city-card[data-index="${idx}"]`);
    if (card) {
      card.classList.add('expanded');
      // Reset the carousel so the new card starts on its first slide.
      const imgs = card.querySelectorAll('.city-thumb-img');
      imgs.forEach((img, i) => img.classList.toggle('active', i === 0));
    }
  }

  function setActiveCity(idx) {
    activeCityIdx = idx;
    if (!globeInstance) return;
    globeInstance.htmlElementsData(buildPoints());
    if (idx === null) return;
    const d = CHINA_DESTINATIONS[idx];
    if (!d) return;
    globeInstance.pointOfView({ lat: d.lat, lng: d.lng, altitude: 1.7 }, 1200);
  }

  (async () => {
    const globe = Globe()(document.getElementById('globe'))
      .backgroundColor('rgba(0,0,0,0)')
      .atmosphereColor('#6db4ff')
      .atmosphereAltitude(0.22)
      .globeImageUrl('earth-blue-marble.jpg')
      .bumpImageUrl('globe-topology.png')

      // Diamond markers, one per business (HTML overlay)
      .htmlElementsData(buildPoints())
      .htmlLat('lat')
      .htmlLng('lng')
      .htmlAltitude(0.012)
      .htmlElement(d => {
        const el = document.createElement('div');
        el.className = 'globe-marker' + (d.isActive ? ' is-active' : '');
        el.innerHTML = `<div class="globe-marker-shape"></div>`;
        el.addEventListener('mouseenter', () => activateCity(d.idx));
        return el;
      });

    globe.globeMaterial().bumpScale = 5;

    // Start centered on Slovakia; auto-rotate will bring China into view
    globe.pointOfView({ lat: SLOVAKIA.lat, lng: SLOVAKIA.lng, altitude: 2.2 }, 0);

    const ctrl = globe.controls();
    ctrl.autoRotate = true;
    ctrl.autoRotateSpeed = 0.3;
    ctrl.enableZoom = false;

    globeInstance = globe;
    globeControls = ctrl;

    window.addEventListener('resize', () => {
      globe.width(window.innerWidth).height(window.innerHeight);
    });
  })().catch(err => {
    console.error(err);
  });

  // ─── Build the cities list from the destination data ──────────────────────
  (function buildCityList() {
    const list = document.getElementById('cities-list');
    const n = CHINA_DESTINATIONS.length;
    CHINA_DESTINATIONS.forEach((d, i) => {
      const hue  = Math.floor((i * 360) / n);
      const hue2 = (hue + 28) % 360;
      const business = BUSINESSES[d.name] || `Tabernam ${d.name}`;
      const desc = DESCRIPTIONS[d.name] || 'A location shaped by four decades of foreign trade between Europe and Asia.';
      const card = document.createElement('article');
      card.className = 'city-card';
      card.dataset.index = i;
      const photos = pickRandomPhotos(5);
      const photoHTML = photos.map((p, pi) =>
        `<img class="city-thumb-img${pi === 0 ? ' active' : ''}" src="${p}" alt="" loading="lazy">`
      ).join('');
      card.innerHTML = `
        <div class="city-eyebrow">${d.name}</div>
        <h2 class="city-name">${business}</h2>
        <div class="city-thumb">${photoHTML}</div>
        <div class="city-details">
          <div class="city-details-inner">
            <p class="city-desc">${desc}</p>
            <h3 class="city-section-title">Our practice on the ground</h3>
            <p class="city-body">From this office, our consultants work side-by-side with European clients entering, scaling, or untangling complex engagements within China. Four decades of cultivated relationships shape every introduction we make, every due-diligence visit we conduct, and every contract negotiation we lead — not as visiting outsiders, but as trusted intermediaries who have earned a seat at the table.</p>
            <h3 class="city-section-title">What we offer</h3>
            <ul class="city-list">
              <li>Market entry assessment and feasibility studies for European businesses</li>
              <li>Supplier discovery, vetting, and ongoing quality oversight</li>
              <li>Negotiation strategy and on-site counsel with Chinese counterparts</li>
              <li>Cross-cultural mediation for established partnerships under strain</li>
              <li>Local representation, government liaison, and discreet introductions</li>
            </ul>
            <h3 class="city-section-title">Who we work with</h3>
            <p class="city-body">European mid-market manufacturers, family-owned trading houses, and institutional investors who need a senior advisor on the ground in China — not a junior account manager, and not a translator. Engagements typically run twelve to thirty-six months, with retained advisory continuing well beyond the initial transaction.</p>
            <button type="button" class="city-button">View Details</button>
          </div>
        </div>`;
      list.appendChild(card);
    });
  })();

  // ─── Toggle expanded state (globe shifts, intro out, cities in, X visible)
  const closeBtn = document.getElementById('close-btn');
  function toggleExpanded() {
    const globe = document.getElementById('globe');
    const isOpening = !globe.classList.contains('shifted');

    if (isOpening) {
      window.scrollTo({ top: 0 });
      document.body.classList.add('no-scroll');
    } else {
      document.body.classList.remove('no-scroll');
    }

    globe.classList.toggle('shifted');
    document.getElementById('intro').classList.toggle('out');
    document.getElementById('cities').classList.toggle('in');
    closeBtn.classList.toggle('visible');

    // When entering expanded state, open the first card and close the rest.
    // When leaving, close all cards.
    const isOpen = globe.classList.contains('shifted');
    const cards = document.querySelectorAll('.city-card');
    cards.forEach((c, i) => {
      c.classList.toggle('expanded', isOpen && i === 0);
    });
    if (globeControls) globeControls.autoRotate = !isOpen;
    setActiveCity(isOpen ? 0 : null);
  }
  document.querySelector('#intro .cta').addEventListener('click', toggleExpanded);
  closeBtn.addEventListener('click', toggleExpanded);

  // ─── Auto-rotate the carousel images on the active card every 2 seconds ──
  setInterval(() => {
    if (!document.getElementById('globe').classList.contains('shifted')) return;
    const card = document.querySelector('.city-card.expanded');
    if (!card) return;
    const imgs = card.querySelectorAll('.city-thumb-img');
    if (imgs.length < 2) return;
    const activeImg = card.querySelector('.city-thumb-img.active') || imgs[0];
    const idx = Array.from(imgs).indexOf(activeImg);
    const nextIdx = (idx + 1) % imgs.length;
    activeImg.classList.remove('active');
    imgs[nextIdx].classList.add('active');
  }, 2000);

  // ─── Hover a closed card to open it (only one card open at a time;
  //     it stays open after the cursor leaves until another card is hovered) ─
  document.getElementById('cities-list').addEventListener('mouseover', (e) => {
    const card = e.target.closest('.city-card');
    if (!card || card.classList.contains('expanded')) return;
    const idx = parseInt(card.dataset.index, 10);
    if (!Number.isNaN(idx)) activateCity(idx);
  });
</script>
</body>
</html>
